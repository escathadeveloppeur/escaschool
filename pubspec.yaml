name: ecole_app
description: "A new Flutter project for UPL school management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
 
  i_google_drive: ^1.0.0  # C'est le package qui va nous aider
  # UI & Icons
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  
  # Base de données locale
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  shared_preferences: ^2.2.2
  
  # Firebase (synchronisation cloud)
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  
  # Utilitaires de synchronisation
  connectivity_plus: ^6.1.3
  uuid: ^4.5.1
  
  # PDF & Documents
  pdf: ^3.11.3
  printing: ^5.14.2
  file_picker: ^8.3.2
  syncfusion_flutter_pdf: ^23.1.42
  share_plus: ^10.1.4      # Pour partager le reçu
  
  # Calendrier & Scanner
  table_calendar: ^3.0.9
  intl: 0.18.1
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  dio: ^5.3.0
  url_launcher: ^6.1.14
  open_file: ^3.3.2
  http: ^1.6.0
  flutter_local_notifications: ^17.0.0
  firebase_messaging: ^15.0.0
  
  # Pour les badges d'icône
  badges: ^3.1.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.3.3
  
  # Outil pour générer le logo automatiquement
  flutter_launcher_icons: ^0.13.1

# Configuration du logo personnalisé
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_foreground_inset: 0.1  # ← Valeur la plus grande
  adaptive_icon_padding: false          # ← Désactive le padding
flutter:
  uses-material-design: true

  # Déclaration des assets
  assets:
    - assets/images/logo.png
